plugins {
  id 'application'
}

group = 'com.fw.projecthq'
version = '0.0.1'

application {
  mainClass = 'com.fw.projecthq.ProjectHQ'
}

java {
  sourceCompatibility = '17'
}

repositories {
}

dependencies {
}

jar {
  manifest {
    attributes(
      'Class-Path': configurations.runtimeClasspath.files.collect { it.getName() }.join(' '),
      'Main-Class': 'com.fw.projecthq.ProjectHQ'
    )
  }
}
